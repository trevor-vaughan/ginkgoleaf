version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: "/fixtures/with-gomega"
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directory: "/fixtures/no-gomega"
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
